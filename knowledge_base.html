.concept-tag{background:var(--surface);border:1px solid var(--border);padding:6px 12px;border-radius:6px;font-size:0.82em;cursor:pointer;transition:.2s}
.concept-tag:hover{border-color:var(--accent);background:#1a1a2e}

/* Graph */
.graph-line{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.graph-line .parent{min-width:110px;font-weight:600;color:var(--gold);font-size:0.82em;text-align:right;padding-top:6px}
.graph-line .children{display:flex;flex-wrap:wrap;gap:4px;flex:1}
.child-link{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:0.76em;cursor:pointer;transition:.2s}
.child-link:hover{border-color:var(--accent)}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px;cursor:pointer;transition:.2s}
.card:hover{border-color:var(--accent)}
.card .cid{font-weight:600;color:var(--accent);font-size:0.88em;margin-bottom:4px}
.card .csum{font-size:0.9em}
.card .cmeta{font-size:0.76em;color:var(--muted);margin-top:6px;display:flex;flex-wrap:wrap;gap:5px}
.card .cmeta span{background:var(--bg);padding:2px 7px;border-radius:4px}
.card .cdetail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:0.82em;color:var(--muted)}
.card.open .cdetail{display:block}
.card .cscene{font-size:0.76em;color:var(--muted);margin-top:3px}

/* Tag cloud */
.tag-cloud{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag-bubble{padding:3px 9px;border-radius:12px;font-size:0.76em;cursor:pointer;border:1px solid var(--border);transition:.2s;background:var(--bg)}

.force-svg{background:var(--bg);border:1px solid var(--border);border-radius:8px;width:100%;height:400px}
.force-svg circle:hover{stroke:var(--accent);stroke-width:2;cursor:pointer}
.force-svg text{fill:var(--text);font-size:9px;pointer-events:none}

.no-results{color:var(--muted);text-align:center;padding:40px}
footer{text-align:center;padding:20px;color:var(--muted);font-size:0.78em;border-top:1px solid var(--border)}
@media(max-width:600px){.controls{flex-direction:column}.controls input{width:100%}.dash{grid-template-columns:repeat(2,1fr)}}
</style>

// ==================== RENDER ====================
function refresh(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  const cat=document.getElementById('catFilter').value;
  const emo=document.getElementById('emoFilter').value;
  let nodes=N;
  if(cat!=='all') nodes=nodes.filter(n=>n.cat===cat);
  if(emo!=='all') nodes=nodes.filter(n=>n.emotion===emo);
  if(q) nodes=nodes.filter(n=>n.id.toLowerCase().includes(q)||n.summary.toLowerCase().includes(q)||(n.tags||[]).some(t=>t.toLowerCase().includes(q))||(n.speaker||'').toLowerCase().includes(q)||(n.scene||'').toLowerCase().includes(q));

  const dCat=N.filter(n=>n.cat==='对话').length, dAI=N.filter(n=>n.cat==='AI项目').length, dSys=N.filter(n=>n.cat==='系统操作').length;
  document.getElementById('statsBar').innerHTML=`<b>${N.length}</b> 个节点 · 💬对话 ${dCat} · 🤖AI项目 ${dAI} · 🔧系统操作 ${dSys} · 经GPT/Claude/Grok审阅`;
  document.getElementById('fCount').textContent=N.length;

  // emotion filter options
  const emos=[...new Set(N.map(n=>n.emotion).filter(Boolean))].sort();
  const esel=document.getElementById('emoFilter');
  esel.innerHTML='<option value="all">😶 全部情绪</option>'+emos.map(e=>`<option value="${e}">${e}</option>`).join('');
  esel.value=emo;

  let h='';

  // Dashboard
  h+=`<div class="section"><h2>📊 节点分布</h2><div class="dash">
    <div class="dash-card green"><div class="num">${dCat}</div><div class="label">💬 莱德利基对话</div></div>
    <div class="dash-card blue"><div class="num">${dAI}</div><div class="label">🤖 AI审阅与项目</div></div>
    <div class="dash-card gold"><div class="num">${dSys}</div><div class="label">🔧 系统操作</div></div>
    <div class="dash-card"><div class="num" style="color:var(--accent)">${nodes.length}</div><div class="label">当前筛选结果</div></div>
  </div></div>`;

  // Concepts
  h+=`<div class="section"><h2>📖 概念词典</h2><div class="concept-row">`;
  CONCEPTS.forEach(c=>{h+=`<div class="concept-tag" title="${c.def}" onclick="document.getElementById('searchBox').value='${c.name}';refresh()">${c.name}</div>`;});
  h+=`</div></div>`;

  // Graph
  h+=`<div class="section"><h2>🔗 记忆连接图谱</h2>`;
  for(const[concept,children]of Object.entries(TREE)){
    h+=`<div class="graph-line"><div class="parent">${concept} →</div><div class="children">`;
    children.forEach(c=>{
      const node=N.find(n=>n.id===c);
      h+=`<div class="child-link" onclick="document.getElementById('searchBox').value='${c.replace(/'/g,"\\'")}';refresh()" title="${node?node.summary.substring(0,60):c}">${c}</div>`;
    });
    h+=`</div></div>`;
  }
  h+=`</div>`;

  // Tag cloud
  const tc={}; nodes.forEach(n=>(n.tags||[]).forEach(t=>{tc[t]=(tc[t]||0)+1}));
  const tsorted=Object.entries(tc).sort((a,b)=>b[1]-a[1]);
  h+=`<div class="section"><h2>🏷 标签云</h2><div class="tag-cloud">`;
  tsorted.forEach(([t,c])=>{h+=`<span class="tag-bubble" style="font-size:${0.72+c*0.04}em" onclick="document.getElementById('searchBox').value='${t}';refresh()">#${t} <small>${c}</small></span>`;});
  h+=`</div></div>`;

  // Nodes
  h+=`<div class="section"><h2>📋 节点列表（${nodes.length}）</h2>`;
  if(!nodes.length) h+=`<div class="no-results">没有匹配的记忆节点。试试别的关键词？</div>`;
  nodes.forEach(n=>{
    const cCat=n.cat==='对话'?`💬`:n.cat==='AI项目'?`🤖`:`🔧`;
    h+=`<div class="card" onclick="this.classList.toggle('open')">
      <div class="cid"><span style="font-size:0.72em;background:var(--accent);color:#fff;padding:1px 6px;border-radius:4px">${n.type}</span> ${cCat} ${n.id}</div>
      <div class="csum">${n.summary}</div>
      <div class="cmeta"><span>🕐${n.time}</span><span>🗣${n.speaker||'—'}</span><span>💭${n.emotion||'—'}</span>${(n.tags||[]).map(t=>`<span>#${t}</span>`).join('')}</div>
      ${n.scene?`<div class="cscene">📍 ${n.scene}</div>`:''}
      <div class="cdetail">
        <strong>分类：</strong>${n.cat}<br>
        <strong>场景：</strong>${n.scene||'—'}<br>
        <strong>情绪：</strong>${n.emotion||'—'}<br>
        <strong>关联节点（共享标签）：</strong><br>
        ${(()=>{const r=N.filter(x=>x.id!==n.id&&(x.tags||[]).some(t=>(n.tags||[]).includes(t))).slice(0,5);return r.length?r.map(x=>`· ${x.id}`).join('<br>'):'无'})()}
      </div>
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('main').innerHTML=h;
}

refresh();
</script>
